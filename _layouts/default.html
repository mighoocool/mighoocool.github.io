<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }} · {{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');</script>
</head>
<body>
<div id="scrub" aria-hidden="true"></div>
<header class="topbar">
  <a class="brand" href="{{ '/' | relative_url }}"><span class="dot"></span>{{ site.title }} <small>· {{ site.tagline }}</small></a>
  <div class="topbar-actions">
    <a class="ghlink" href="https://github.com/{{ site.github.repository_nwo | default: 'mighoocool/mighoocool.github.io' }}" title="在 GitHub 查看">GitHub</a>
    <button class="toggle" id="themeBtn" aria-label="切换明暗主题">切换主题</button>
  </div>
</header>

<div class="shell">
  <nav class="rail" aria-label="学习路径">
    <p class="eyebrow">学习路径</p>
    <div class="track">
      {% for item in site.data.toc %}
      <a class="stop{% if item.url == page.url %} active{% endif %}" href="{{ item.url | relative_url }}">
        <span class="num">{{ item.num }}</span>{{ item.title }}
      </a>
      {% endfor %}
    </div>
  </nav>

  <main>
    <article id="doc">
      {{ content }}
    </article>
    <nav class="pager" aria-label="上一篇 / 下一篇"></nav>
  </main>

  <aside class="toc" aria-label="本页目录">
    <p class="eyebrow">本页目录</p>
    <div id="tocList"></div>
  </aside>
</div>

<script>window.__TOC__ = {{ site.data.toc | jsonify }}; window.__URL__ = "{{ page.url }}";</script>
<script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  window.__renderMermaid__ = (theme) => {
    // Rouge wraps unknown languages as <div class="language-mermaid ..."><pre><code>src</code></pre></div>
    document.querySelectorAll('.language-mermaid').forEach(host => {
      const code = host.querySelector('code') || host;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent.replace(/\n$/, '');
      host.replaceWith(div);
    });
    if (!document.querySelector('.mermaid')) return;
    mermaid.initialize({ startOnLoad:false, theme: theme==='dark'?'dark':'neutral', securityLevel:'loose' });
    mermaid.run({ querySelector: '.mermaid:not([data-processed])' });
  };
  window.__renderMermaid__(document.documentElement.dataset.theme);
</script>
</body>
</html>
